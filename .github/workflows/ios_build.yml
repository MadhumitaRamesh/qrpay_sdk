name: Build iOS IPA (Unsigned)
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-13
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build iOS App
        run: |
          cd qrpay_sdk/example
          flutter build ios --release --no-codesign
          
      - name: Package into IPA
        run: |
          cd qrpay_sdk/example
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r QRPay_Demo_iOS_Unsigned.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QRPay-iOS-App
          path: qrpay_sdk/example/QRPay_Demo_iOS_Unsigned.ipa
