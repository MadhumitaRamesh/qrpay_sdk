name: qrpay_sdk_android
description: The Android implementation of qrpay_sdk.
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.35.1"

flutter:
  plugin:
    implements: qrpay_sdk
    platforms:
      android:
        package: com.example.qrpay_sdk
        pluginClass: QrpaySdkPlugin
        dartPluginClass: QrpaySdkAndroid

dependencies:
  flutter:
    sdk: flutter
  qrpay_sdk_platform_interface:
    path: ../qrpay_sdk_platform_interface
